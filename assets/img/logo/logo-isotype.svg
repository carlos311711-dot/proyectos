<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none" class="da-logo-icon">
  <!-- Main 'A' Structure in Navy/White (currentColor) -->
  <path d="M 28 85 L 53 20 L 78 85" stroke="currentColor" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Right 'D' Loop branching from the right leg -->
  <path d="M 64 50 C 76 50, 84 58, 84 70 C 84 82, 74 85, 62 85" stroke="currentColor" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Network node lines branching from the right leg to the top-right -->
  <path d="M 58 35 Q 70 32, 78 20" stroke="var(--accent-color)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="78" cy="20" r="4.5" fill="var(--accent-color)"/>
  
  <path d="M 62 45 Q 75 42, 83 30" stroke="var(--accent-color)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="83" cy="30" r="4.5" fill="var(--accent-color)"/>

  <path d="M 66 55 Q 80 52, 88 40" stroke="var(--accent-color)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="88" cy="40" r="4.5" fill="var(--accent-color)"/>

  <!-- Inner Cyan Arch inside the bottom right 'D' loop -->
  <path d="M 52 75 C 62 75, 74 75, 74 68 C 74 62, 62 62, 52 62" stroke="var(--accent-color)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
